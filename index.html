<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>동산보드판</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <!--
    카카오 Maps SDK: appkey는 ami-work 프로젝트에서 공유 (815dudwns.github.io 등록).
    services 라이브러리 포함 (coord2Address 역지오코딩).
    HTTPS(GitHub Pages) 환경에서 GPS + 역지오코딩 동작.
    file:// 로컬 접근 시 GPS는 불가 → 수동 입력 사용.
  -->
  <script type="text/javascript"
    src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=2eae4b699110525f0dc62295ed8ed43d&libraries=services&autoload=false">
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">

  <!-- 메인 페이지 -->
  <section id="page-main" style="display:none;">
    <div class="page-header">
      <h1>동산보드판</h1>
      <button class="btn-secondary btn-sm" id="btn-go-settings" type="button">설정</button>
    </div>

    <!-- Phase 5: 세션 복사 버튼 -->
    <div class="session-copy-row">
      <button class="btn-secondary btn-sm" id="btn-copy-morning" type="button" disabled>오전과 동일</button>
      <button class="btn-secondary btn-sm" id="btn-copy-yesterday" type="button" disabled>어제와 동일</button>
      <span class="session-hint" id="session-hint"></span>
    </div>

    <!-- Phase B: "기존과 동일" 감지 배너 -->
    <div class="match-banner" id="match-banner" style="display:none;">
      이전 세션에서 자동입력됨
      <button class="btn-sm btn-secondary" id="btn-match-reset" type="button">초기화</button>
    </div>

    <!-- Phase 1: 공통필드 -->
    <div class="card" id="section-common">
      <h2>공통 정보</h2>

      <!-- B-1: 공사명 select -->
      <div class="form-row">
        <label for="project-name">공사명</label>
        <select id="project-name"></select>
      </div>

      <!-- B-2: 사업소 고정 (테스트 단계) -->
      <div class="form-row">
        <label for="office">사업소 <span class="office-fixed-hint">(테스트 단계 고정값)</span></label>
        <input type="text" id="office" value="마포용산지사" readonly disabled>
        <!-- TODO: Phase B+ office auto-match by district -->
      </div>

      <!-- B-3: 작업장소 + GPS + 지도 버튼 -->
      <div class="form-row">
        <label for="workplace">작업장소</label>
        <div class="input-with-btn">
          <input type="text" id="workplace" placeholder="주소 또는 GPS / 지도에서 선택">
          <button class="btn-secondary btn-sm" id="btn-gps" type="button">GPS</button>
          <button class="btn-secondary btn-sm" id="btn-open-map" type="button">지도에서 선택</button>
        </div>
        <span class="gps-status" id="gps-status"></span>
      </div>

      <div class="form-row">
        <label for="field-content">내용</label>
        <input type="text" id="field-content" placeholder="작업전 안전회의(오전)">
      </div>

      <div class="form-row">
        <label for="field-date">작업일자</label>
        <input type="text" id="field-date" placeholder="YYYY.MM.DD">
      </div>

      <!-- B-4: 작업원 칩 -->
      <div class="form-row">
        <label>작업원</label>
        <div class="worker-chips" id="worker-chips"></div>
      </div>
    </div>

    <!-- 지도 모달 (B-3) -->
    <div class="modal-backdrop" id="map-modal-backdrop" style="display:none;" aria-modal="true" role="dialog">
      <div class="modal map-modal" id="map-modal">
        <div class="modal__header">
          <span class="modal__title">지도에서 선택</span>
          <p class="modal__hint">롱프레스(0.5초 누르기)로 핀을 꽂으세요</p>
        </div>
        <div class="map-modal__map" id="map-modal-map"></div>
        <p class="map-modal__preview" id="map-modal-address">핀 위치 주소가 여기 표시됩니다</p>
        <div class="modal__actions">
          <button class="btn-secondary" id="btn-map-cancel" type="button">취소</button>
          <button class="btn-primary" id="btn-map-confirm" type="button" disabled>확인</button>
        </div>
      </div>
    </div>

    <!-- datalist: 작업원 자동완성 (하위 호환, Phase C까지 유지) -->
    <datalist id="worker-datalist"></datalist>

    <!-- Phase 2: 사진 3섹션 -->
    <div class="card" id="section-photos">
      <h2>사진 업로드</h2>

      <!-- 작업자 사진 -->
      <div class="photo-section">
        <h3>작업자 사진 (1장)</h3>
        <div class="photo-controls">
          <label class="btn-secondary btn-sm" style="display:inline-block; cursor:pointer;">
            사진 선택
            <input type="file" id="file-workers" accept="image/*" style="display:none;">
          </label>
          <button class="btn-danger btn-sm" id="btn-delete-workers" style="display:none;" type="button">삭제</button>
        </div>
        <div class="preview-wrap" id="preview-workers">
          <span class="empty-hint">사진 없음</span>
        </div>
      </div>

      <hr>

      <!-- 서류 사진 -->
      <div class="photo-section">
        <h3>서류 사진 (1장)</h3>
        <div class="photo-controls">
          <label class="btn-secondary btn-sm" style="display:inline-block; cursor:pointer;">
            사진 선택
            <input type="file" id="file-documents" accept="image/*" style="display:none;">
          </label>
          <button class="btn-danger btn-sm" id="btn-delete-documents" style="display:none;" type="button">삭제</button>
        </div>
        <div class="preview-wrap" id="preview-documents">
          <span class="empty-hint">사진 없음</span>
        </div>
      </div>

      <hr>

      <!-- 차대비 사진 -->
      <div class="photo-section">
        <h3>차대비 사진 (0장 이상, 개인별 1명)</h3>
        <div class="photo-controls">
          <label class="btn-secondary btn-sm" style="display:inline-block; cursor:pointer;">
            사진 추가
            <input type="file" id="file-vehicles" accept="image/*" multiple style="display:none;">
          </label>
        </div>
        <div id="vehicle-list"></div>
      </div>
    </div>

    <!-- Phase 5: 조 저장/불러오기 -->
    <div class="card" id="section-crews">
      <h2>조 관리</h2>
      <div class="crew-actions">
        <button class="btn-secondary btn-sm" id="btn-save-crew" type="button">현재 작업원 조 저장</button>
        <select id="select-crew">
          <option value="">-- 저장된 조 선택 --</option>
        </select>
        <button class="btn-secondary btn-sm" id="btn-load-crew" type="button">불러오기</button>
      </div>
      <div id="crew-list" class="crew-list"></div>
    </div>

    <!-- Phase 3: 합성 미리보기 -->
    <div class="card" id="section-compose">
      <h2>합성 미리보기</h2>
      <button class="btn-primary" id="btn-compose" type="button">합성 미리보기</button>
      <div class="compose-result-area" id="compose-result"></div>
    </div>

    <!-- Phase 4: 밴드 공유 -->
    <div class="card" id="section-share">
      <h2>밴드 공유</h2>
      <button class="btn-primary btn-share" id="btn-share" type="button">밴드 공유</button>
      <div id="share-status" class="share-status"></div>
      <div id="share-fallback" class="share-fallback" style="display:none;">
        <p class="warn">이 기기는 파일 공유를 지원하지 않습니다.<br>아래 이미지를 저장한 뒤 밴드 앱에서 직접 첨부해주세요.</p>
        <div id="share-download-list"></div>
      </div>
    </div>
  </section>

  <!-- 설정/온보딩 페이지 -->
  <section id="page-settings" style="display:none;">
    <div class="card">
      <h2 id="settings-heading">설정</h2>

      <!-- 공사명 -->
      <div class="settings-section">
        <h3 class="settings-subheading">공사명</h3>
        <ul id="project-list" class="settings-list"></ul>
        <div class="settings-add-row">
          <input type="text" id="project-input" placeholder="공사명 입력">
          <button class="btn-secondary btn-sm" id="btn-add-project" type="button">추가</button>
        </div>
      </div>

      <hr>

      <!-- 작업원 -->
      <div class="settings-section">
        <h3 class="settings-subheading">작업원</h3>
        <ul id="worker-list" class="settings-list"></ul>
        <div class="settings-add-row">
          <input type="text" id="worker-input" placeholder="작업원 이름 입력">
          <button class="btn-secondary btn-sm" id="btn-add-worker" type="button">추가</button>
        </div>
      </div>

      <hr>

      <!-- 완료/이동 버튼 -->
      <div class="settings-actions">
        <button class="btn-primary" id="btn-onboarding-done" type="button" disabled>완료</button>
        <button class="btn-secondary" id="btn-go-main" type="button" style="display:none;">메인으로</button>
      </div>
    </div>
  </section>

</div>

<script src="js/storage.js"></script>
<script src="js/compose.js"></script>
<script>
  if (typeof kakao !== 'undefined' && kakao.maps) {
    kakao.maps.load(function () {});
  }
</script>
<script src="js/router.js"></script>
<script src="js/settings.js"></script>
<script src="js/app.js"></script>
</body>
</html>
