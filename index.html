<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Ami-board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <!--
    카카오 Maps SDK: appkey는 ami-work 프로젝트에서 공유 (815dudwns.github.io 등록).
    services 라이브러리 포함 (coord2Address 역지오코딩).
    HTTPS(GitHub Pages) 환경에서 GPS + 역지오코딩 동작.
    file:// 로컬 접근 시 GPS는 불가 → 수동 입력 사용.
  -->
  <script type="text/javascript"
    src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=2eae4b699110525f0dc62295ed8ed43d&libraries=services&autoload=false">
  </script>
  <link rel="stylesheet" href="css/style.css?v=20260419j">
</head>
<body>
<script>
  // iOS Safari 핀치 줌 차단 (meta viewport user-scalable=no 무시 대응)
  document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
  document.addEventListener('gesturechange', function (e) { e.preventDefault(); });
  document.addEventListener('gestureend', function (e) { e.preventDefault(); });
  // 더블탭 줌 차단
  var lastTouch = 0;
  document.addEventListener('touchend', function (e) {
    var now = Date.now();
    if (now - lastTouch <= 350) e.preventDefault();
    lastTouch = now;
  }, { passive: false });
</script>
<div class="container">

  <!-- 메인 페이지 -->
  <section id="page-main" style="display:none;">
    <div class="page-header">
      <h1>Ami-board</h1>
      <button class="btn-secondary btn-sm" id="btn-go-settings" type="button">설정</button>
    </div>

    <!-- Phase 5: 세션 복사 버튼 -->
    <div class="session-copy-row">
      <button class="btn-secondary btn-sm" id="btn-copy-morning" type="button" disabled>오전과 동일</button>
      <button class="btn-secondary btn-sm" id="btn-copy-yesterday" type="button" disabled>어제와 동일</button>
      <span class="session-hint" id="session-hint"></span>
    </div>

    <!-- Phase B: "기존과 동일" 감지 배너 -->
    <div class="match-banner" id="match-banner" style="display:none;">
      이전 세션에서 자동입력됨
      <button class="btn-sm btn-secondary" id="btn-match-reset" type="button">초기화</button>
    </div>

    <!-- Phase 1: 공통필드 -->
    <div class="card" id="section-common">
      <h2>공통 정보</h2>

      <!-- B-1: 공사명 select -->
      <div class="form-row">
        <label for="project-name">공사명</label>
        <select id="project-name"></select>
      </div>

      <!-- B-3: 작업장소 + GPS + 지도 버튼 -->
      <div class="form-row">
        <label for="workplace">작업장소</label>
        <div class="input-with-btn">
          <input type="text" id="workplace" placeholder="주소 또는 GPS / 지도에서 선택">
          <button class="btn-secondary btn-sm" id="btn-gps" type="button">GPS</button>
          <button class="btn-secondary btn-sm" id="btn-open-map" type="button">지도에서 선택</button>
        </div>
        <span class="gps-status" id="gps-status"></span>
      </div>

      <!-- §5.1 사업소: 7개 지사 자동 매핑, (자동) 옵션 없음 -->
      <div class="form-row">
        <label for="field-office">사업소</label>
        <select id="field-office">
        </select>
      </div>

      <div class="form-row">
        <label>작업전안전회의(오전/오후)</label>
        <div class="content-toggle" id="content-toggle" role="group" aria-label="내용 선택">
          <button type="button" id="btn-content-am" class="btn-toggle" aria-pressed="false">오전</button>
          <button type="button" id="btn-content-pm" class="btn-toggle" aria-pressed="false">오후</button>
        </div>
      </div>

      <div class="form-row">
        <label for="field-date">작업일자</label>
        <input type="date" id="field-date">
      </div>

      <!-- B-4: 작업원 칩 -->
      <div class="form-row">
        <label>작업원</label>
        <div class="worker-chips" id="worker-chips"></div>
      </div>
    </div>

    <!-- 지도 모달 (B-3) -->
    <div class="modal-backdrop" id="map-modal-backdrop" style="display:none;" aria-modal="true" role="dialog">
      <div class="modal map-modal" id="map-modal">
        <div class="modal__header">
          <span class="modal__title">지도에서 선택</span>
          <p class="modal__hint">지도를 탭하여 핀을 꽂으세요</p>
        </div>
        <div class="map-modal__map" id="map-modal-map"></div>
        <p class="map-modal__preview" id="map-modal-address">핀 위치 주소가 여기 표시됩니다</p>
        <div class="modal__actions">
          <button class="btn-secondary" id="btn-map-cancel" type="button">취소</button>
          <button class="btn-primary" id="btn-map-confirm" type="button" disabled>확인</button>
        </div>
      </div>
    </div>

    <!-- datalist: 작업원 자동완성 (하위 호환, Phase C까지 유지) -->
    <datalist id="worker-datalist"></datalist>

    <!-- Phase F: 자동 입히기 -->
    <div class="card" id="section-autofill">
      <h2>자동 입히기</h2>
      <div id="autofill-actions">
        <button class="btn-primary btn-autofill" id="btn-autofill" type="button">자동 입히기</button>
        <!-- Tier 3: 수동 취소 버튼 — 피커 취소 감지 실패 시 최후의 보루 -->
        <button class="btn-secondary btn-sm" id="btn-autofill-cancel" type="button" style="display:none; margin-left:8px;">취소</button>
        <div id="autofill-actions-loaded" style="display:none;">
          <button class="btn-secondary" id="btn-add-photos" type="button">사진 추가</button>
          <button class="btn-secondary" id="slot-clear-photos-btn" type="button">사진 초기화</button>
        </div>
      </div>

      <!-- 멀티셀렉트 hidden file input (capture 속성 없음 — photo_upload_policy.md) -->
      <input type="file" id="auto-file-multi" accept="image/*" multiple style="display:none;">

      <!-- Phase F: 슬롯 할당 UI (멀티셀렉트 완료 후 표시) -->
      <div class="slot-assign-ui" id="slot-assign-ui" style="display:none;">
        <!-- 슬롯 카드 그리드 (Sortable 대상) -->
        <div class="slot-cards" id="slot-cards"></div>
        <!-- + 버튼 (Sortable 컨테이너 바깥) -->
        <button class="btn-secondary btn-sm slot-add-btn" id="slot-add-btn" type="button">+ 차량사진 추가</button>

        <!-- 사진 전체 초기화 버튼 → autofill-actions-loaded로 이동, 여기선 제거 -->

        <!-- 합성 미리보기 버튼 -->
        <button class="btn-primary btn-autofill" id="btn-compose-preview" type="button" disabled style="margin-top:12px;">합성 미리보기</button>
      </div>

      <!-- Phase C/F: 합성 미리보기 그리드 -->
      <div class="preview-grid" id="preview-grid" style="display:none;">
        <h3 class="preview-grid__title">합성 미리보기</h3>
        <div class="preview-grid__items" id="preview-grid-items"></div>
        <button class="btn-primary btn-save-band" id="btn-save-band" type="button" disabled>사진첩저장</button>
        <!-- Web Share 성공 후 표시 -->
        <button class="btn-secondary btn-open-band" id="btn-open-band" type="button" style="display:none; width:100%; margin-top:8px;">밴드 열기</button>
        <!-- 자동입히기 완전 초기화 버튼 (밴드 열기 옆, 저장 완료 후 표시) -->
        <button class="btn-secondary btn-sm" id="btn-autofill-reset-full" type="button" style="display:none; margin-top:8px; width:100%;">초기화</button>
      </div>
    </div>

    <!-- Phase 5: 조 저장/불러오기 (v1 호환 — CSS 숨김 상태, DOM 유지) -->
    <div class="card" id="section-crews" style="display:none;">
      <h2>조 관리</h2>
      <div class="crew-actions">
        <button class="btn-secondary btn-sm" id="btn-save-crew" type="button">현재 작업원 조 저장</button>
        <select id="select-crew">
          <option value="">-- 저장된 조 선택 --</option>
        </select>
        <button class="btn-secondary btn-sm" id="btn-load-crew" type="button">불러오기</button>
      </div>
      <div id="crew-list" class="crew-list"></div>
    </div>

  </section>

  <!-- 설정/온보딩 페이지 -->
  <section id="page-settings" style="display:none;">
    <div class="card">
      <h2 id="settings-heading">설정</h2>

      <!-- 공사명 -->
      <div class="settings-section">
        <h3 class="settings-subheading">공사명</h3>
        <ul id="project-list" class="settings-list"></ul>
        <div class="settings-add-row">
          <input type="text" id="project-input" placeholder="공사명 입력">
          <button class="btn-secondary btn-sm" id="btn-add-project" type="button">추가</button>
        </div>
      </div>

      <hr>

      <!-- 작업원 -->
      <div class="settings-section">
        <h3 class="settings-subheading">작업원</h3>
        <ul id="worker-list" class="settings-list"></ul>
        <div class="settings-add-row">
          <input type="text" id="worker-input" placeholder="작업원 이름 입력">
          <button class="btn-secondary btn-sm" id="btn-add-worker" type="button">추가</button>
        </div>
      </div>

      <hr>

      <!-- 완료/이동 버튼 -->
      <div class="settings-actions">
        <button class="btn-primary" id="btn-onboarding-done" type="button" disabled>완료</button>
        <button class="btn-secondary" id="btn-go-main" type="button" style="display:none;">메인으로</button>
      </div>

      <hr style="margin: 20px 0;">

      <!-- 전체 초기화 -->
      <div class="settings-section">
        <button class="btn-danger" id="btn-reset-all" type="button">전체 초기화</button>
      </div>
    </div>
  </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="js/storage.js?v=20260419j"></script>
<script src="js/office-mapping.js?v=20260419j"></script>
<script src="js/compose.js?v=20260419j"></script>
<script>
  if (typeof kakao !== 'undefined' && kakao.maps) {
    kakao.maps.load(function () {});
  }
</script>
<script src="js/router.js?v=20260419j"></script>
<script src="js/settings.js?v=20260419j"></script>
<script src="js/app.js?v=20260419j"></script>
<script src="js/autofill.js?v=20260419j"></script>
</body>
</html>
